<section class="grid grid-cols-1 md:grid-cols-2 gap-3">
  <div class="bg-white rounded shadow p-10">
    <h2 class="text-2xl font-bold mb-5">{{ showContent() }}</h2>
    <button class="p-2 bg-blue-500 text-white rounded" (click)="toggleContent()">Click me!</button>
    @if (showContent() == false) {
      <p class="mt-2">Es falso</p>
    } @else {
      <p class="mt-2">Es verdad</p>
    }
  </div>
</section>
